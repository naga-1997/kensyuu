<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">


<head>
	<!-- 修正アドバイス: <head>内に <div> を直接配置するのはHTML5の仕様外です。 -->
	<!-- フラグメント側（meta, styles）が <meta> や <link> タグである場合、 -->
	<!-- 本来は <head th:replace="..."> のようにタグ自体を置き換えるか、 -->
	<!-- <th:block th:replace="..."> を使うのが一般的です。 -->
	<div th:replace="~{fragment :: meta}"></div>
	<div th:replace="~{fragment :: styles}"></div>
	<title>ログイン</title>
</head>

<body>
	<div class="moattravel-wrapper">
		<!-- ヘッダー -->
		<div th:replace="~{fragment :: header}"></div>
		<main>
			<div class="container pt-4 pb-5 moattravel-container">
				<div class="row justify-content-center">
					<div class="col-xl-3 col-lg-4 col-md-5 col-sm-7">
						<h1 class="mb-4 text-center">ログイン</h1>
						<div th:if="${param.error}" class="alert alert-danger">
							メールアドレスまたはパスワードが正しくありません。
						</div>
						<form th:action="@{/login}" method="post">
							<div class="form-group mb-3">
								<input type="text" class="form-control" name="username" autocomplete="email"
									placeholder="メールアドレス" autofocus>
							</div>
							<div class="form-group mb-3">
								<input type="password" class="form-control" name="password" autocomplete="new-password"
									placeholder="パスワード">
							</div>
							<div class="form-group d-flex justify-content-center my-4">
								<button type="submit"
									class="btn text-white shadow-sm w-100 moattravel-btn">ログイン</button>
							</div>
						</form>
						<div class="text-center">
							<!-- 【不備指摘】<a>タグが2重になっています。上の行を削除してください。 -->
							<!-- <a href="#"> -->
							<a th:href="@{/signup}">
								会員登録
							</a>
						</div>
					</div>
				</div>
			</div>
		</main>

		<!-- フッター -->
		<div th:replace="~{fragment :: footer}"></div>
	</div>
	<div th:replace="~{fragment :: scripts}"></div>
</body>

</html>
